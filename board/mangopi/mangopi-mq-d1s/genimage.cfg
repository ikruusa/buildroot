# Minimal SD card image for the MangoPi MQ F133 D1s
# https://mangopi.org/mangopi_mq

image sdcard.img {
	hdimage {
	}

	partition u-boot {
		in-partition-table = false
		image = "u-boot-sunxi-with-spl.bin"
		offset = 8K
	}

	partition rootfs {
		partition-type = 0x83
		image = "rootfs.ext4"
		bootable = "true"
		offset = 1M
	}
}
